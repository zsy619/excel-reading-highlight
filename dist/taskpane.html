<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>阅读模式高亮设置</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Fabric UI styles -->
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <link href="78d0d4e2f3fa6b24cb68.css" rel="stylesheet" type="text/css" />
<script defer src="polyfill.js"></script><script defer src="taskpane.js"></script></head>

<body class="ms-font-m ms-welcome ms-Fabric">
    <main id="app-body" class="ms-welcome__main">
        <h2 class="ms-font-xl reading-header">阅读模式</h2>
        <p class="ms-font-s description">选中单元格时自动高亮所在整行、整列与当前单元格</p>

        <!-- 开关 -->
        <div class="toggle-row">
            <label class="ms-font-m toggle-label" for="toggle-reading">高亮开关</label>
            <div class="toggle-switch" id="toggle-reading" role="switch" aria-checked="false" tabindex="0">
                <div class="toggle-thumb"></div>
            </div>
        </div>

        <!-- 填充颜色区域 -->
        <div class="settings-section">
            <h3 class="ms-font-s section-title">填充颜色</h3>

            <div class="color-row">
                <label class="ms-font-s color-label" for="row-color">行/列高亮颜色</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="row-color" class="color-picker" value="#E3F2FD" />
                    <span class="color-hex" id="row-color-hex">#E3F2FD</span>
                </div>
            </div>

            <div class="color-row">
                <label class="ms-font-s color-label" for="column-color">当前单元格颜色</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="column-color" class="color-picker" value="#FFF3B0" />
                    <span class="color-hex" id="column-color-hex">#FFF3B0</span>
                </div>
            </div>
        </div>

        <!-- 边框 + 表头区域 -->
        <div class="settings-section">
            <h3 class="ms-font-s section-title">边框 &amp; 表头</h3>

            <div class="toggle-row">
                <label class="ms-font-s toggle-label" for="toggle-border">显示边框</label>
                <div class="toggle-switch toggle-sm" id="toggle-border" role="switch" aria-checked="true" tabindex="0">
                    <div class="toggle-thumb"></div>
                </div>
            </div>

            <div class="color-row">
                <label class="ms-font-s color-label" for="border-color">边框颜色</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="border-color" class="color-picker" value="#0078D4" />
                    <span class="color-hex" id="border-color-hex">#0078D4</span>
                </div>
            </div>

            <div class="color-row">
                <label class="ms-font-s color-label" for="header-color">表头填充颜色</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="header-color" class="color-picker" value="#E8F5E9" />
                    <span class="color-hex" id="header-color-hex">#E8F5E9</span>
                </div>
            </div>

            <div class="select-row">
                <label class="ms-font-s color-label" for="border-style">边框样式</label>
                <select id="border-style" class="style-select">
                    <option value="Continuous">实线</option>
                    <option value="Dash">虚线</option>
                    <option value="Dot">点线</option>
                    <option value="DashDot">短划线-点</option>
                    <option value="DashDotDot">短划线-点-点</option>
                </select>
            </div>
        </div>

        <!-- 状态信息 -->
        <div class="status-section">
            <span class="ms-font-s status-text" id="status-text">状态: 未激活</span>
        </div>

        <!-- 操作按钮 -->
        <div class="actions-section">
            <button class="ms-font-s clear-all-btn" id="clear-all" type="button">全 sheet 清高亮</button>
        </div>
    </main>
</body>

</html>
